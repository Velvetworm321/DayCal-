name: 打包 DayCal Windows 安装包

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 生成 Logo (Python)
        run: |
          pip install Pillow
          python assets/gen_logo.py

      - name: 打包（安装包 + 便携版）
        env:
          ELECTRON_BUILDER_NO_PUBLISH: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: DayCal-安装包-Windows
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30
