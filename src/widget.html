<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#FF8FAB;--accent2:#FFB347;--green:#6EE7A0;
  --text:#1a1a2e;--text2:#8888aa;--text-color:#1a1a2e;
  --card-bg:rgba(255,255,255,0.86);--surface:rgba(248,246,243,0.90);
  --border:rgba(0,0,0,0.09);--border-hover:rgba(0,0,0,0.18);
  --shadow:0 4px 24px rgba(0,0,0,0.10);--radius:14px;--clock-size:38px;
}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;
  -webkit-user-select:none;user-select:none;
  font-family:'Microsoft YaHei','PingFang SC','Segoe UI',sans-serif;font-size:13px;}

/* ── Widget shell ── */
#widget{width:100vw;height:100vh;background:var(--card-bg);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:var(--radius);border:1px solid transparent;box-shadow:none;
  display:flex;flex-direction:column;overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s,background 0.3s;}
#widget:hover:not(.frozen){border-color:var(--border-hover);box-shadow:var(--shadow);}

/* ── Drag bar – appears on hover ── */
#drag-bar{height:28px;background:transparent;border-bottom:1px solid transparent;
  display:flex;align-items:center;padding:0 8px;gap:6px;
  -webkit-app-region:drag;flex-shrink:0;
  border-radius:var(--radius) var(--radius) 0 0;
  transition:background 0.2s,border-color 0.2s,opacity 0.2s;
  opacity:0;pointer-events:none;}
#widget:hover:not(.frozen) #drag-bar{opacity:1;pointer-events:all;
  background:var(--surface);border-bottom-color:var(--border);}
/* Frozen: keep drag bar invisible but buttons clickable */
#widget.frozen #drag-bar{opacity:0;pointer-events:all;}
#widget.frozen:hover #drag-bar{opacity:1;pointer-events:all;
  background:var(--surface);border-bottom-color:var(--border);}
#widget.frozen #body{pointer-events:none;}

button,input,textarea,a{-webkit-app-region:no-drag;}
.dot-btn{width:11px;height:11px;border-radius:50%;border:none;cursor:pointer;
  flex-shrink:0;transition:filter 0.15s;-webkit-app-region:no-drag;}
.dot-btn:hover{filter:brightness(0.82);}
.dot-close{background:#ff5f57;}
.dot-pin{background:#28c840;}.dot-pin.off{background:#bbb;}
/* Lock button */
.dot-lock{background:var(--accent);transition:background 0.15s;}
.dot-lock.unlocked{background:#bbb;}

.drag-title{flex:1;text-align:center;font-size:10px;color:var(--text2);
  letter-spacing:2px;pointer-events:none;-webkit-app-region:drag;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);
  font-size:12px;padding:2px 4px;border-radius:4px;
  transition:color 0.12s,background 0.12s;-webkit-app-region:no-drag;line-height:1;}
.icon-btn:hover{color:var(--accent);background:rgba(0,0,0,0.05);}

#body{flex:1;padding:10px 12px 10px;overflow:hidden;display:flex;flex-direction:column;gap:6px;
  transition:pointer-events 0.1s,opacity 0.2s;}
#resize-h{position:fixed;bottom:0;right:0;width:18px;height:18px;
  cursor:se-resize;-webkit-app-region:no-drag;opacity:0;transition:opacity 0.2s;}
#widget:hover:not(.frozen) #resize-h{opacity:1;}
#resize-h::before{content:'';position:absolute;bottom:3px;right:3px;width:8px;height:8px;
  border-right:2px solid var(--text2);border-bottom:2px solid var(--text2);
  border-radius:0 0 2px 0;opacity:0.5;}



/* ── Clock ── */
.clock-time{font-size:var(--clock-size);font-weight:300;color:var(--text-color);
  letter-spacing:-1px;line-height:1;transition:font-size 0.2s;}
.clock-sub{display:flex;gap:8px;margin-top:4px;font-size:11px;color:var(--text2);}
.clock-week{color:var(--accent);font-weight:500;}

/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.cal-nav-lbl{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--text-color);}
.nav-btn{width:20px;height:20px;border-radius:5px;border:none;
  background:rgba(0,0,0,0.05);color:var(--text2);font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;}
.nav-btn:hover{background:var(--accent);color:#fff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.cal-wd{text-align:center;font-size:9px;color:var(--text2);padding-bottom:2px;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:10px;border-radius:4px;cursor:pointer;color:var(--text-color);
  position:relative;transition:background 0.1s;}
.cal-d:hover{background:rgba(255,143,171,0.15);}
.cal-d.other{color:rgba(0,0,0,0.18);}
.cal-d.today{background:var(--accent);color:#fff;font-weight:600;}
.cal-d.selected:not(.today){background:rgba(255,143,171,0.22);outline:1.5px solid var(--accent);}
.cal-d.has-dot::after{content:'';position:absolute;bottom:1px;
  width:3px;height:3px;border-radius:50%;background:var(--accent);}
.cal-d.today.has-dot::after{background:rgba(255,255,255,0.85);}

/* ── Day popup ── */
#day-popup{position:fixed;inset:0;background:rgba(0,0,0,0.25);
  display:none;align-items:center;justify-content:center;
  z-index:1000;-webkit-app-region:no-drag;backdrop-filter:blur(4px);}
#day-popup.open{display:flex;}
.popup-card{background:var(--card-bg);backdrop-filter:blur(24px);
  border:1px solid var(--border-hover);border-radius:14px;
  padding:16px 18px;width:280px;max-height:80vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.18);}
.popup-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.popup-date{font-size:14px;font-weight:600;color:var(--text-color);}
.popup-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:17px;line-height:1;padding:2px;}
.popup-sec{margin-bottom:14px;}
.popup-sec-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}

/* ── Todo ── */
.todo-list{flex:1;overflow-y:auto;margin-bottom:6px;}
.todo-item{display:flex;align-items:flex-start;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);}
.todo-item:last-child{border-bottom:none;}
.chk{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--text2);
  cursor:pointer;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;font-size:8px;transition:all 0.12s;}
.chk.done{background:var(--green);border-color:var(--green);color:#fff;}
.todo-txt{flex:1;font-size:12px;color:var(--text-color);line-height:1.4;}
.todo-txt.done{text-decoration:line-through;color:var(--text2);}
.del-btn{background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:13px;opacity:0;transition:opacity 0.1s;padding:0 2px;flex-shrink:0;}
.todo-item:hover .del-btn,.alarm-item:hover .del-btn{opacity:1;}

/* ── Inputs ── */
.add-row{display:flex;gap:5px;flex-shrink:0;}
.inp{flex:1;background:var(--surface);border:1px solid var(--accent2);border-radius:7px;
  padding:5px 8px;font-size:12px;color:var(--text-color);outline:none;transition:border 0.12s;
  font-family:inherit;-webkit-user-select:text;user-select:text;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--text2);}
.inp-time{flex:none;width:80px;color-scheme:light;}
.inp-date{flex:none;width:116px;color-scheme:light;}
.add-btn{background:var(--accent);border:none;color:#fff;border-radius:7px;width:26px;
  font-size:17px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:opacity 0.12s;}
.add-btn:hover{opacity:0.82;}
.tone-sel{flex:none;background:var(--surface);border:1px solid var(--accent2);
  border-radius:7px;padding:4px 5px;font-size:11px;color:var(--text-color);
  outline:none;font-family:inherit;cursor:pointer;}

/* ── Memo ── */
.memo-ta{flex:1;width:100%;background:var(--surface);border:1px solid var(--accent2);
  border-radius:7px;padding:7px 8px;font-size:12px;color:var(--text-color);resize:none;outline:none;
  line-height:1.7;font-family:inherit;min-height:60px;
  -webkit-user-select:text;user-select:text;transition:border 0.12s;}
.memo-ta:focus{border-color:var(--accent);}
.memo-ta::placeholder{color:var(--text2);}
.memo-foot{display:flex;justify-content:flex-end;flex-shrink:0;margin-top:5px;}
.save-btn{background:var(--accent);border:none;color:#fff;
  border-radius:6px;padding:4px 14px;font-size:11px;cursor:pointer;
  font-family:inherit;transition:opacity 0.12s;}
.save-btn:hover{opacity:0.82;}

/* ── Alarm ── */
.alarm-list{flex:1;overflow-y:auto;margin-bottom:6px;}
.alarm-item{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);}
.alarm-item:last-child{border-bottom:none;}
.alarm-time{font-size:13px;color:var(--accent);font-weight:500;min-width:44px;}
.alarm-lbl{flex:1;font-size:11px;color:var(--text-color);}
.alarm-date{font-size:10px;color:var(--text2);min-width:52px;text-align:right;}
.alarm-tone{font-size:10px;color:var(--text2);}
.sw{width:28px;height:15px;border-radius:8px;background:var(--border);border:none;
  cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;
  background:#fff;border-radius:50%;transition:left 0.2s;}
.sw.on{background:var(--accent);}
.sw.on::after{left:15px;}

/* ── Toast ── */
#toasts{position:fixed;bottom:8px;right:8px;z-index:9999;
  display:flex;flex-direction:column-reverse;gap:5px;pointer-events:none;}
.toast{background:var(--card-bg);border:1px solid var(--border-hover);
  border-left:3px solid var(--accent);border-radius:8px;
  padding:8px 10px;display:flex;gap:7px;align-items:flex-start;
  min-width:170px;max-width:230px;pointer-events:all;animation:tIn 0.2s ease;}
.toast.alarm-t{border-left-color:var(--accent);}
.t-ttl{font-size:9px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px;}
.t-bdy{font-size:11px;color:var(--text-color);}
.t-x{background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;margin-left:auto;flex-shrink:0;}
@keyframes tIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
@keyframes tOut{to{opacity:0;transform:translateY(8px)}}
.empty{text-align:center;font-size:11px;color:var(--text2);padding:8px 0;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>

    <span class="drag-title" id="mod-title"></span>
    <div style="display:flex;align-items:center;gap:4px;-webkit-app-region:no-drag">
      <button class="icon-btn" id="btn-settings">⚙</button>
    </div>
  </div>
  <div id="body"></div>
  <div id="resize-h"></div>
</div>
<div id="day-popup">
  <div class="popup-card">
    <div class="popup-head">
      <span class="popup-date" id="popup-date-lbl"></span>
      <button class="popup-close" id="popup-close-btn">×</button>
    </div>
    <div id="popup-content"></div>
  </div>
</div>
<div id="toasts"></div>

<script>
'use strict';

/* ══ Shared data (IPC, single source of truth) ══ */
let D={todos:{},memos:{},alarms:[]};
async function loadD(){try{const s=await window.api?.getData();if(s)D=s;}catch(e){}}
async function saveD(){try{await window.api?.setData(D);}catch(e){}}
window.api?.onDataChanged(nd=>{
  D=nd;
  if(MOD==='calendar')renderCal();
  if(MOD==='todo')renderTodos();
  if(MOD==='memo')renderMemo();
  if(MOD==='alarm')renderAlarms();
});
// Alarm fire broadcast — every window receives this and plays audio
window.api?.onAlarmFire(info=>{
  playTone(info.tone||'gentle');
  showToast(T('alarm_fired'),`${info.label}`,'🔔',true);
});
// Alarm stop broadcast — every window stops audio
window.api?.onAlarmStop(()=>{
  if(currentAlarmStop){ currentAlarmStop(); currentAlarmStop=null; }
});

/* ══ Config ══ */
let CFG={theme:'light',accent:'#FF8FAB',accent2:'#FFB347',
  opacity:86,font:'Microsoft YaHei',fontSize:13,clockSize:38,lang:'zh',textColor:'#1a1a2e'};
async function loadCFG(){try{const s=await window.api?.getConfig();if(s)CFG=Object.assign(CFG,s);}catch{}applyCFG();}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function applyCFG(){
  const r=document.documentElement.style,isDark=CFG.theme==='dark';
  r.setProperty('--accent', CFG.accent||'#FF8FAB');
  r.setProperty('--accent2',CFG.accent2||'#FFB347');
  const op=(CFG.opacity||86)/100;
  const tc=CFG.textColor||(isDark?'#f0eee8':'#1a1a2e');
  r.setProperty('--text-color',tc);
  if(isDark){
    r.setProperty('--card-bg',`rgba(22,22,34,${op})`);r.setProperty('--surface',`rgba(30,30,46,${op})`);
    r.setProperty('--border','rgba(255,255,255,0.09)');
    r.setProperty('--border-hover', hexToRgba(CFG.accent2||'#FFB347', 0.55));
    r.setProperty('--text','#f0eee8');r.setProperty('--text2','#8a8aa8');r.setProperty('--shadow','0 4px 24px rgba(0,0,0,0.35)');
  }else{
    r.setProperty('--card-bg',`rgba(255,255,255,${op})`);r.setProperty('--surface',`rgba(248,246,243,${op})`);
    r.setProperty('--border','rgba(0,0,0,0.09)');
    // border-hover uses accent2 (the "边框色" the user picked)
    r.setProperty('--border-hover', hexToRgba(CFG.accent2||'#FFB347', 0.55));
    r.setProperty('--text','#1a1a2e');r.setProperty('--text2','#8888aa');r.setProperty('--shadow','0 4px 24px rgba(0,0,0,0.10)');
  }
  document.body.style.fontFamily=`'${CFG.font||'Microsoft YaHei'}','PingFang SC','Segoe UI',sans-serif`;
  document.body.style.fontSize=(CFG.fontSize||13)+'px';
  r.setProperty('--clock-size',(CFG.clockSize||38)+'px');
  // Re-render dynamic text labels that depend on lang/accent
  document.getElementById('mod-title').textContent=T('mod_'+MOD);
  // Update button tooltips with current language
  updateBtnTitles();
  // Re-render module content to pick up new translations
  reRenderModule();
}

let audioCtx=null;
let currentAlarmStop=null; // function to stop current alarm loop
let previewStop=null;      // preview stop handle
let customAudioBuffer=null; // user-uploaded audio
let customAudioName='';

function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('mousedown',()=>getCtx(),{once:true});

// Each tone builder returns a stop() function
const TONE_BUILDERS={
  // 1. 柔和水晶 — repeating bell melody, 60s loop
  gentle(ctx){
    const MELODY=[523,659,784,1047,784,659,523,659];
    const STEP=0.55, LOOP_DUR=MELODY.length*STEP;
    const masterGain=ctx.createGain(); masterGain.connect(ctx.destination); masterGain.gain.value=1;
    let stopped=false;
    function scheduleLoop(startT){
      if(stopped)return;
      MELODY.forEach((f,i)=>{
        const t=startT+i*STEP;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(masterGain);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.15,t+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        o.start(t);o.stop(t+0.55);
      });
      // Add a gentle harmony note every other loop
      [0,2,4,6].forEach(i=>{
        const t=startT+i*STEP;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(masterGain);
        o.type='sine';o.frequency.value=MELODY[i]*0.5;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.07,t+0.1);g.gain.exponentialRampToValueAtTime(0.001,t+STEP*0.9);
        o.start(t);o.stop(t+STEP);
      });
      setTimeout(()=>scheduleLoop(startT+LOOP_DUR),( LOOP_DUR-0.3)*1000);
    }
    scheduleLoop(ctx.currentTime);
    // Fade out after 60s
    masterGain.gain.setValueAtTime(1,ctx.currentTime+55);
    masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+60);
    return ()=>{stopped=true;masterGain.gain.cancelScheduledValues(ctx.currentTime);masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);};
  },

  // 2. 晨雾森林 — slow chord pads, ambient, 60s
  forest(ctx){
    const CHORDS=[[261,329,392,523],[293,370,440,587],[246,311,370,493],[261,329,392,523]];
    const STEP=4.0;
    const masterGain=ctx.createGain();masterGain.connect(ctx.destination);masterGain.gain.value=1;
    let stopped=false;
    function scheduleLoop(startT){
      if(stopped)return;
      CHORDS.forEach((chord,ci)=>{
        chord.forEach(f=>{
          const t=startT+ci*STEP;
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g);g.connect(masterGain);
          o.type='triangle';o.frequency.value=f;
          // slight detune for warmth
          o.detune.value=(Math.random()-0.5)*8;
          g.gain.setValueAtTime(0,t);
          g.gain.linearRampToValueAtTime(0.06,t+0.6);
          g.gain.setValueAtTime(0.06,t+STEP-0.8);
          g.gain.linearRampToValueAtTime(0,t+STEP);
          o.start(t);o.stop(t+STEP+0.1);
        });
      });
      // Bird-like trill on top
      [0.5,1.5,2.3,3.1,3.9,5.1,6.2,7.0,8.1,9.2,10.3,11.4,12.5,13.6,14.7,15.8].forEach(d=>{
        const f=2000+Math.random()*400;
        const t=startT+d;
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(masterGain);o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.04,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
        o.start(t);o.stop(t+0.15);
      });
      const loopDur=CHORDS.length*STEP;
      setTimeout(()=>scheduleLoop(startT+loopDur),(loopDur-0.5)*1000);
    }
    scheduleLoop(ctx.currentTime);
    masterGain.gain.setValueAtTime(1,ctx.currentTime+55);masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+60);
    return ()=>{stopped=true;masterGain.gain.cancelScheduledValues(ctx.currentTime);masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.5);};
  },

  // 3. 律动节拍 — 90bpm groove, 60s
  rhythm(ctx){
    const BPM=90,BEAT=60/BPM,BAR=BEAT*4;
    const masterGain=ctx.createGain();masterGain.connect(ctx.destination);masterGain.gain.value=1;
    let stopped=false;
    function noiseBuffer(){
      const b=ctx.createBuffer(1,ctx.sampleRate*0.06,ctx.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.4));
      return b;
    }
    const snareNoiseBuf=(()=>{const b=ctx.createBuffer(1,ctx.sampleRate*0.18,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.25));return b;})();
    function kick(t){
      const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(masterGain);o.type='sine';
      o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(40,t+0.1);
      g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.start(t);o.stop(t+0.28);
    }
    function snare(t){
      const src=ctx.createBufferSource(),g=ctx.createGain();
      src.buffer=snareNoiseBuf;src.connect(g);g.connect(masterGain);
      g.gain.setValueAtTime(0.30,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);src.start(t);src.stop(t+0.20);
    }
    // Pre-bake one hi-hat buffer to avoid creating many per bar
    const _hihatBuf=(()=>{const b=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.06),ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.4));return b;})();
    function hihat(t,vol=0.2){
      const src=ctx.createBufferSource(),g=ctx.createGain();
      src.buffer=_hihatBuf;src.connect(g);g.connect(masterGain);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);src.start(t);src.stop(t+0.07);
    }
    function bass(t,f){
      const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(masterGain);o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+BEAT*0.85);o.start(t);o.stop(t+BEAT);
    }
    const BASS_LINE=[65,65,73,65,58,65,73,82]; // E1 groove
    function scheduleBar(startT){
      if(stopped)return;
      // Kick pattern: 1, 2.5, 3
      kick(startT);kick(startT+BEAT*1.5);kick(startT+BEAT*2);
      // Snare: 2, 4
      snare(startT+BEAT);snare(startT+BEAT*3);
      // 8th note hi-hats
      for(let i=0;i<8;i++) hihat(startT+i*BEAT*0.5, i%2===0?0.22:0.15);
      // Bass line
      BASS_LINE.forEach((f,i)=>bass(startT+i*BEAT*0.5,f));
      // Lead melody (pentatonic phrase every 2 bars)
      if(Math.round(startT/BAR)%2===0){
        [0,0.67,1.0,1.5,2.0,2.5,3.0,3.5].forEach((d,i)=>{
          const mel=[392,440,494,523,587,494,440,392];
          const t=startT+d*BEAT;
          const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(masterGain);
          o.type='square';o.frequency.value=mel[i];
          g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.001,t+BEAT*0.45);o.start(t);o.stop(t+BEAT*0.5);
        });
      }
      setTimeout(()=>scheduleBar(startT+BAR),(BAR-0.1)*1000);
    }
    scheduleBar(ctx.currentTime);
    masterGain.gain.setValueAtTime(1,ctx.currentTime+55);masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+60);
    return ()=>{stopped=true;masterGain.gain.cancelScheduledValues(ctx.currentTime);masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.2);};
  },

  // 4. 活力冲刺 — 140bpm driving energy, 60s
  energy(ctx){
    const BPM=140,BEAT=60/BPM,BAR=BEAT*4;
    const masterGain=ctx.createGain();masterGain.connect(ctx.destination);masterGain.gain.value=1;
    let stopped=false;
    // Pre-bake noise buffers once to avoid per-beat allocation noise
    const _snBuf=(()=>{const b=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.15),ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.28));return b;})();
    const _hatBuf=(()=>{const b=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.04),ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));return b;})();
    const _ohatBuf=(()=>{const b=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.10),ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));return b;})();
    function kick(t){
      const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(masterGain);o.type='sine';
      o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(40,t+0.1);
      g.gain.setValueAtTime(0.55,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.22);
    }
    function snare(t){
      const src=ctx.createBufferSource(),g=ctx.createGain();
      src.buffer=_snBuf;src.connect(g);g.connect(masterGain);
      g.gain.setValueAtTime(0.32,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);src.start(t);src.stop(t+0.18);
    }
    function hat(t,open=false){
      const src=ctx.createBufferSource(),g=ctx.createGain();
      src.buffer=open?_ohatBuf:_hatBuf;src.connect(g);g.connect(masterGain);
      const dur=open?0.10:0.04;
      g.gain.setValueAtTime(open?0.15:0.20,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);src.start(t);src.stop(t+dur+0.02);
    }
    const CHORD_PROG=[[523,659,784],[587,740,880],[493,622,740],[523,659,784]];
    function chord(t,freqs){
      freqs.forEach(f=>{
        const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(masterGain);o.type='sawtooth';o.frequency.value=f;
        g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+BEAT*0.9);o.start(t);o.stop(t+BEAT);
      });
    }
    const LEAD=[784,880,784,659,784,880,1047,880];
    function scheduleBar(startT){
      if(stopped)return;
      // Kicks: every beat + extra on 1.5
      [0,BEAT,BEAT*1.5,BEAT*2,BEAT*3].forEach(d=>kick(startT+d));
      // Snares: 2 and 4
      snare(startT+BEAT);snare(startT+BEAT*3);
      // 16th hi-hats
      for(let i=0;i<16;i++) hat(startT+i*BEAT*0.25,i%4===2);
      // Chords each beat
      const barIdx=Math.round(startT/BAR)%CHORD_PROG.length;
      for(let b=0;b<4;b++) chord(startT+b*BEAT,CHORD_PROG[(barIdx+b)%CHORD_PROG.length]);
      // Lead melody every 2 bars
      if(Math.round(startT/BAR)%2===0){
        LEAD.forEach((f,i)=>{
          const t=startT+i*BEAT*0.5;
          const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(masterGain);o.type='square';o.frequency.value=f;
          g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+BEAT*0.45);o.start(t);o.stop(t+BEAT*0.5);
        });
      }
      setTimeout(()=>scheduleBar(startT+BAR),(BAR-0.1)*1000);
    }
    scheduleBar(ctx.currentTime);
    masterGain.gain.setValueAtTime(1,ctx.currentTime+55);masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+60);
    return ()=>{stopped=true;masterGain.gain.cancelScheduledValues(ctx.currentTime);masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.2);};
  }
};

const TONE_NAMES=['gentle','forest','rhythm','energy'];

function playTone(name,isPreview){
  try{
    const stopRef=isPreview?'previewStop':'currentAlarmStop';
    if(window[stopRef]){window[stopRef]();window[stopRef]=null;}
    if(!isPreview&&previewStop){previewStop();previewStop=null;}
    const ctx=getCtx();if(!ctx)return;
    let stopFn;
    if(name==='custom'&&customAudioBuffer){
      let activeSrc=null,activeGain=null,customStopped=false;
      // shouldRepeat: for alarm playback, check the alarm's repeat setting; for preview always false
      function playCustomOnce(){
        if(customStopped)return;
        try{
          const src=ctx.createBufferSource(),g=ctx.createGain();
          activeSrc=src;activeGain=g;
          src.buffer=customAudioBuffer;
          src.connect(g);g.connect(ctx.destination);
          g.gain.value=0.8;
          src.start(ctx.currentTime);
          src.onended=function(){
            if(!customStopped&&shouldRepeat) playCustomOnce();
          };
        }catch(e){console.error('custom play',e);}
      }
      playCustomOnce();
      // For preview: auto-stop after 8s
      if(isPreview){
        const previewTimer=setTimeout(()=>{customStopped=true;try{if(activeSrc)activeSrc.stop();}catch{}},8000);
        stopFn=()=>{customStopped=true;clearTimeout(previewTimer);try{if(activeGain){activeGain.gain.cancelScheduledValues(ctx.currentTime);activeGain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.15);}setTimeout(()=>{try{if(activeSrc)activeSrc.stop();}catch{}},200);} catch{}};
      } else {
        stopFn=()=>{customStopped=true;try{if(activeGain){activeGain.gain.cancelScheduledValues(ctx.currentTime);activeGain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.2);}setTimeout(()=>{try{if(activeSrc)activeSrc.stop();}catch{}},250);}catch{}};
      }
    } else {
      const builder=TONE_BUILDERS[name]||TONE_BUILDERS.gentle;
      stopFn=builder(ctx);
      if(!isPreview)setTimeout(()=>{if(currentAlarmStop){currentAlarmStop();currentAlarmStop=null;}},61000);
    }
    if(isPreview){
      previewStop=stopFn;
      setTimeout(()=>{if(previewStop){previewStop();previewStop=null;}},8000);
    } else {
      currentAlarmStop=stopFn;
    }
  }catch(e){console.error('playTone',e);}
}

function buildClock(body){
  body.innerHTML=`<div class="clock-time" id="ct">00:00:00</div>
    <div class="clock-sub"><span id="cd"></span><span class="clock-week" id="cw"></span></div>`;
  function tick(){
    const n=new Date();
    document.getElementById('ct').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;

/* ══ CALENDAR ══ */
function buildCalendar(body){
  body.innerHTML=`<div class="cal-nav">
      <button class="nav-btn" id="cp">‹</button>
      <span class="cal-nav-lbl" id="cl"></span>
      <button class="nav-btn" id="cn">›</button>
    </div>
    <div class="cal-grid" id="cg"></div>`;
  document.getElementById('cp').addEventListener('click',()=>chMo(-1));
  document.getElementById('cn').addEventListener('click',()=>chMo(1));
  renderCal();
  // Auto-refresh at midnight so today highlight stays correct
  let _calDay=new Date().getDate();
  setInterval(()=>{const d=new Date().getDate();if(d!==_calDay){_calDay=d;const n=new Date();vY=n.getFullYear();vM=n.getMonth();renderCal();}},60000);
}
function chMo(delta){vM+=delta;if(vM>11){vM=0;vY++;}if(vM<0){vM=11;vY--;}renderCal();}
function renderCal(){
  const lbl=document.getElementById('cl'),g=document.getElementById('cg');if(!lbl||!g)return;
  const ry=vY,rm=vM;
  lbl.textContent=`${ry}.${pad(rm+1)}`;
  g.innerHTML='';
  // Use localized weekday names
  for(let i=0;i<7;i++){const d=document.createElement('div');d.className='cal-wd';d.textContent=Tw(i);g.appendChild(d);}
  const fd=new Date(ry,rm,1).getDay(),dim=new Date(ry,rm+1,0).getDate(),prevDim=new Date(ry,rm,0).getDate(),now=new Date();
  for(let i=fd-1;i>=0;i--){const c=document.createElement('div');c.className='cal-d other';c.textContent=prevDim-i;g.appendChild(c);}
  for(let d=1;d<=dim;d++){
    const dd=d,k=toKey(ry,rm,dd);
    const isT=now.getFullYear()===ry&&now.getMonth()===rm&&now.getDate()===dd;
    const hasDot=(D.todos[k]?.length>0)||!!D.memos[k]||D.alarms.some(a=>a.date===k);
    const c=document.createElement('div');
    c.className='cal-d'+(isT?' today':'')+(selKey===k&&!isT?' selected':'')+(hasDot?' has-dot':'');
    c.textContent=dd;c.addEventListener('click',()=>openDayPopup(ry,rm,dd));g.appendChild(c);
  }
  const rem=(fd+dim)%7===0?0:7-((fd+dim)%7);
  for(let d=1;d<=rem;d++){const c=document.createElement('div');c.className='cal-d other';c.textContent=d;g.appendChild(c);}
}

// Get ALL schedule items across all dates, sorted
function getAllScheduleItems(){
  const all=[];
  Object.keys(D.memos).forEach(dateKey=>{
    try{
      const raw=D.memos[dateKey];
      if(!raw)return;
      const parsed=JSON.parse(raw);
      if(Array.isArray(parsed)){
        parsed.forEach(it=>all.push({...it,date:dateKey}));
      }else if(typeof raw==='string'&&raw.trim()){
        all.push({id:uid(),text:raw,date:dateKey,startTime:'',endTime:'',done:false});
      }
    }catch{
      const raw=D.memos[dateKey];
      if(raw&&typeof raw==='string')all.push({id:uid(),text:raw,date:dateKey,startTime:'',endTime:'',done:false});
    }
  });
  return all.sort((a,b)=>{
    if(a.date!==b.date)return a.date.localeCompare(b.date);
    const ta=a.startTime||'';const tb=b.startTime||'';
    if(!ta&&!tb)return 0;if(!ta)return 1;if(!tb)return -1;
    return ta.localeCompare(tb);
  });
}

function renderMemo(){
  const list=document.getElementById('sch-list');if(!list)return;
  const hdr=document.getElementById('sch-hdr');if(hdr)hdr.textContent=T('mod_memo');
  const items=getAllScheduleItems();
  if(!items.length){list.innerHTML=`<div class="empty">${T('sch_empty')}</div>`;return;}
  list.innerHTML='';
  // Group by date — Mac Calendar style
  let lastDate='';
  items.forEach(item=>{
    // Date header
    if(item.date!==lastDate){
      lastDate=item.date;
      const now=todayKey();
      const dh=document.createElement('div');
      dh.style.cssText='font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);padding:6px 0 2px;font-weight:600;';
      dh.textContent=item.date===now?T('today'):item.date.slice(5).replace('-','/');
      list.appendChild(dh);
    }
    // Event block — Mac Calendar style
    const block=document.createElement('div');
    const color=item.done?'rgba(0,0,0,0.08)':'var(--accent)';
    const textColor=item.done?'var(--text2)':'#fff';
    block.style.cssText=`background:${color};border-radius:6px;padding:5px 8px;margin-bottom:4px;position:relative;cursor:default;transition:opacity 0.15s;`;
    // Time range
    const timeStr=(item.startTime&&item.endTime)?`${item.startTime} – ${item.endTime}`:(item.startTime||item.time||'');
    const timeEl=document.createElement('div');
    timeEl.style.cssText=`font-size:10px;color:${item.done?'var(--text2)':'rgba(255,255,255,0.8)'};margin-bottom:1px;`;
    timeEl.textContent=timeStr;
    // Title
    const titleEl=document.createElement('div');
    titleEl.style.cssText=`font-size:12px;font-weight:500;color:${textColor};${item.done?'text-decoration:line-through;':''}`;
    titleEl.textContent=item.text;
    // Checkbox (circle)
    const chk=document.createElement('div');
    chk.style.cssText=`position:absolute;right:28px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;border:1.5px solid ${item.done?'var(--green)':'rgba(255,255,255,0.6)'};background:${item.done?'var(--green)':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;`;
    if(item.done)chk.textContent='✓';
    chk.addEventListener('click',e=>{e.stopPropagation();toggleScheduleItem(item.id,item.date);});
    // Delete
    const del=document.createElement('button');
    del.style.cssText='position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:13px;opacity:0;padding:0 2px;';
    del.textContent='×';
    del.addEventListener('click',e=>{e.stopPropagation();delScheduleItem(item.id,item.date);});
    block.addEventListener('mouseenter',()=>del.style.opacity='1');
    block.addEventListener('mouseleave',()=>del.style.opacity='0');
    if(timeStr)block.append(timeEl);
    block.append(titleEl,chk,del);
    list.appendChild(block);
  });
}

async function addScheduleItem(){
  const inp=document.getElementById('sch-inp');if(!inp)return;

  try{const raw=D.memos[dateKey];if(raw){const p=JSON.parse(raw);items=Array.isArray(p)?p:[];}}catch{}
  const newItem={id:uid(),text,date:dateKey,startTime,endTime,done:false};
  items.push(newItem);
  D.memos[dateKey]=JSON.stringify(items);
  await saveD();renderMemo();
  showToast(T('sch_added'),text,'📅',false);
}

async function toggleScheduleItem(id,dateKey){
  const dk=dateKey||memoSel;
  let items=[];
  try{const raw=D.memos[dk];if(raw){const p=JSON.parse(raw);items=Array.isArray(p)?p:[];}}catch{}
  const it=items.find(x=>x.id===id);

async function delScheduleItem(id,dateKey){

  let items=[];
  try{const raw=D.memos[dk];if(raw){const p=JSON.parse(raw);items=Array.isArray(p)?p:[];}}catch{}

  if(items.length)D.memos[dk]=JSON.stringify(items);else delete D.memos[dk];
  await saveD();renderMemo();
}

      <div style="display:flex;gap:4px">
        <input class="inp" id="al-lbl" placeholder="${T('add_alarm_lbl')}" maxlength="30" style="flex:1">
        <label style="display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text2);cursor:pointer;flex-shrink:0;-webkit-app-region:no-drag" title="${T('alarm_repeat')}"><input type="checkbox" id="al-repeat" style="-webkit-app-region:no-drag">↻</label>
        <button class="add-btn" id="al-add">+</button>
      </div>
      <div id="al-custom-name" style="font-size:10px;color:var(--accent2);display:none"></div>
    </div>`;
  document.getElementById('al-add').addEventListener('click',addAlarm);
  document.getElementById('al-lbl').addEventListener('keydown',e=>{if(e.key==='Enter')addAlarm();});
  // Preview button
  document.getElementById('al-preview').addEventListener('click',()=>{
    const tone=document.getElementById('al-tone').value;
    if(previewStop){previewStop();previewStop=null;document.getElementById('al-preview').textContent='▶';return;}
    playTone(tone,true);
    document.getElementById('al-preview').textContent='■';
    setTimeout(()=>{document.getElementById('al-preview').textContent='▶';},8100);
  });
  // File upload — safe callback form, size limit 80MB (~5min audio)
  document.getElementById('al-upload').addEventListener('change',function(){
    const file=this.files[0];if(!file)return;
    const nameEl=document.getElementById('al-custom-name');
    nameEl.style.display='block';
    if(file.size>80*1024*1024){nameEl.textContent='⚠ 文件过大 (max 80MB)';return;}
    if(!/\.(mp3|wav|ogg|m4a|aac|flac)$/i.test(file.name)){nameEl.textContent='⚠ 不支持的格式';return;}
    nameEl.textContent='⏳ 加载中…';
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        // Slice a copy — original is transferred by decodeAudioData and cannot be reused
        const ab=e.target.result.slice(0);
        const ctx=getCtx();
        // Callback form is required in Electron — Promise form can crash the renderer
        ctx.decodeAudioData(
          ab,
          function(buffer){
            customAudioBuffer=buffer;
            customAudioName=file.name.replace(/\.[^.]+$/,'');
            nameEl.textContent='✓ '+customAudioName;
            const sel=document.getElementById('al-tone');
            if(sel) sel.value='custom';
            // Auto-preview 2s
            playTone('custom',true);
          },
          function(err){
            nameEl.textContent='⚠ 解码失败，请用 MP3 或 WAV';
            console.error('decode error:',err);
          }
        );
      }catch(err){
        nameEl.textContent='⚠ '+err.message;
        console.error('upload catch:',err);
      }
    };
    reader.onerror=function(){nameEl.textContent='⚠ 读取失败';};
    reader.readAsArrayBuffer(file);
  });
  renderAlarms();
}
function renderAlarms(){
  const list=document.getElementById('al-list');if(!list)return;
  // Refresh tone select options (lang may have changed)
  const sel=document.getElementById('al-tone');
  if(sel){const cur=sel.value;sel.innerHTML=[...TONE_NAMES,'custom'].map(n=>`<option value="${n}">${toneLabel(n)}</option>`).join('');sel.value=cur;}
  const sorted=[...D.alarms].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  if(!sorted.length){list.innerHTML=`<div class="empty">${T('empty_alarm')}</div>`;return;}
  list.innerHTML='';
  sorted.forEach(a=>{
    const row=document.createElement('div');row.className='alarm-item';
    const time=document.createElement('div');time.className='alarm-time';time.textContent=a.time;
    const lbl=document.createElement('div');lbl.className='alarm-lbl';lbl.textContent=a.label;
    const dt=document.createElement('div');dt.className='alarm-date';dt.textContent=a.date||'';
    const tn=document.createElement('div');tn.className='alarm-tone';tn.textContent=toneLabel(a.tone);
    const sw=document.createElement('button');sw.className='sw'+(a.on?' on':'');sw.addEventListener('click',()=>toggleAlarm(a.id));
    const del=document.createElement('button');del.className='del-btn';del.textContent='×';del.addEventListener('click',()=>delAlarm(a.id));
    row.addEventListener('mouseenter',()=>del.style.opacity='1');
    row.addEventListener('mouseleave',()=>del.style.opacity='0');
    if(a.repeat){const rep=document.createElement('span');rep.textContent='↻';rep.style.cssText='font-size:11px;color:var(--accent2);';row.insertBefore(rep,sw);}
    row.append(time,lbl,dt,tn,sw,del);list.appendChild(row);
  });
}
async function addAlarm(){
  const t=document.getElementById('al-time')?.value,dt=document.getElementById('al-date')?.value,
        tone=document.getElementById('al-tone')?.value||'gentle',l=document.getElementById('al-lbl')?.value.trim()||'';
  const repeat=document.getElementById('al-repeat')?.checked||false;
  if(!t)return;D.alarms.push({id:uid(),date:dt||todayKey(),time:t,label:l,tone,on:true,repeat});
  document.getElementById('al-lbl').value='';await saveD();renderAlarms();showToast(T('alarm_set'),`${dt||''} ${t}`,'⏰',true);
}
async function toggleAlarm(id){
  const a=D.alarms.find(x=>x.id===id);if(!a)return;
  a.on=!a.on;
  fired.delete(a.id);
  if(!a.on){
    // Stop local audio if playing
    if(currentAlarmStop){ currentAlarmStop(); currentAlarmStop=null; }
    // Broadcast stop to all other windows too
    window.api?.broadcastAlarmStop(id);
  }
  await saveD();renderAlarms();
}
async function delAlarm(id){D.alarms=D.alarms.filter(x=>x.id!==id);await saveD();renderAlarms();}
function checkAlarms(now){
  const cur=`${pad(now.getHours())}:${pad(now.getMinutes())}`,dk=todayKey();
  D.alarms.forEach(a=>{
    if(!a.on||(a.date&&a.date!==dk))return;
    const fk=`${a.id}-${dk}`;
    if(a.time===cur&&!fired.has(fk)){
      fired.add(fk);
      showToast(T('alarm_fired'),`${a.time} — ${a.label}`,'🔔',true);
      // Broadcast alarm fire to ALL windows so any window can play/show it
      window.api?.broadcastAlarmFire({id:a.id,tone:a.tone||'gentle',label:a.label});
    }
  });
}

/* ══ Toast ══ */
function showToast(title,body,icon,isAlarm){
  const c=document.getElementById('toasts');const div=document.createElement('div');div.className='toast'+(isAlarm?' alarm-t':'');
  const x=document.createElement('button');x.className='t-x';x.textContent='×';x.addEventListener('click',()=>closeToast(div));
  div.innerHTML=`<span>${icon}</span><div style="flex:1"><div class="t-ttl">${title}</div><div class="t-bdy">${esc(body)}</div></div>`;div.appendChild(x);c.appendChild(div);
  setTimeout(()=>closeToast(div),isAlarm?9000:4000);
}
function closeToast(div){div.style.animation='tOut 0.2s ease forwards';setTimeout(()=>div.remove(),200);}

/* ══ Init ══ */
async function init(){
  await loadCFG();await loadD();
  const now=new Date();vY=now.getFullYear();vM=now.getMonth();selKey='';  // don't pre-select, let .today CSS handle today highlight
  const body=document.getElementById('body');
  if(MOD==='clock')    buildClock(body);
  if(MOD==='calendar') buildCalendar(body);
  if(MOD==='todo')     buildTodo(body);
  if(MOD==='memo')     buildMemo(body);
  if(MOD==='alarm')    buildAlarm(body);
  if(MOD==='clock'){
    setTimeout(async()=>{
      const n=(D.todos[todayKey()]||[]).filter(t=>!t.done).length;
      if(n>0)showToast(T('daily_remind'),T('daily_remain',{n}),'📋',false);
    },2500);
  }
}
init();
</script>
